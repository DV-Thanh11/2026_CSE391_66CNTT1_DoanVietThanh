<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Form Flexbox</title>
    <link rel="stylesheet" href="/2026_CSE391_66CNTT1_DoanVietThanh/Practice2/FlexBox/ex1/ex1.css">
</head>
<body>
    <div class="container">
        <form action="">
            <div class="form-header">
                <h3>Get in touch with us by filling contact form below</h3>
            </div>

            <div class="form-body">
                <div class="row-group">
                    <input type="text" name="name" placeholder="* Enter your full name">
                    <input type="email" name="email" placeholder="* Enter your email address">
                </div>

                <div class="full-width">
                    <input type="text" name="subject" placeholder="Enter your subject">
                </div>

                <div class="full-width">
                    <textarea name="message" placeholder="* Your message here..."></textarea>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit">Send message</button>
                <p>* Please fill all required form field, thanks!</p>
            </div>
        </form>
    </div>
</body>
</html>
